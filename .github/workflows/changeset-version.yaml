on:
  workflow_call:
    outputs:
      version:
        description: 'The Hive package version'
        value: ${{ jobs.changeset-version.outputs.version }}

jobs:
  changeset-version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.package-version.outputs.version }}

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          # `changeset version` walks git history to find the commit that added
          # each changeset. On a shallow clone it deepens via `git fetch --deepen`
          # in a loop, which intermittently stalls and hangs the job. Full history
          # skips that path; blob:none keeps the download to the ~14 MiB commit/tree
          # graph instead of ~394 MiB, since the file blobs are never needed here.
          fetch-depth: 0
          filter: blob:none

      - name: setup environment
        uses: ./.github/actions/setup
        with:
          actor: changeset-version

      - name: Apply changeset version
        # @changesets/changelog-github hits the GitHub API per changeset; a GitHub
        # API incident makes this hang indefinitely (nominal run is ~1 min), so fail
        # fast instead of holding the runner for the whole workflow timeout.
        timeout-minutes: 10
        run: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Version from package.json
        id: package-version
        run: |
          VERSION=$(jq -r '.version' deployment/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
