name: 'hive-e2e'
services:
  oidc-server-mock:
    image: ghcr.io/soluto/oidc-server-mock:0.8.6
    ports:
      - '7043:80'
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      SERVER_OPTIONS_INLINE: |
        {
          "AccessTokenJwtType": "JWT",
          "Discovery": {
            "ShowKeySet": true
          },
          "Authentication": {
            "CookieSameSiteMode": "Lax",
            "CheckSessionCookieSameSiteMode": "Lax"
          }
        }
      LOGIN_OPTIONS_INLINE: |
        {
          "AllowRememberLogin": false
        }
      LOGOUT_OPTIONS_INLINE: |
        {
          "AutomaticRedirectAfterSignOut": true
        }
      USERS_CONFIGURATION_PATH: /tmp/config/users-config.json
      CLIENTS_CONFIGURATION_PATH: /tmp/config/clients-config.json
    volumes:
      - ./configs/oidc-server-mock/clients-config.json:/tmp/config/clients-config.json:ro
      - ./configs/oidc-server-mock/users-config.json:/tmp/config/users-config.json:ro
    networks:
      - 'stack'

  db:
    ports:
      - '5432:5432'

  workflows:
    ports:
      - '3014:3014'
    environment:
      EMAIL_PROVIDER: mock

  redis:
    ports:
      - '6379:6379'

  usage-ingestor:
    environment:
      # Make reported operations queryable in Insights synchronously, so the usage e2e tests
      # don't race ClickHouse's async-insert timer. Both settings are required: wait-for-flush
      # makes the insert block until the data is queryable, and the low busy-timeout makes that
      # flush happen in ~100ms instead of waiting up to the default 30s. Prod keeps its
      # fire-and-forget defaults.
      CLICKHOUSE_WAIT_FOR_ASYNC_INSERT: '1'
      CLICKHOUSE_ASYNC_INSERT_BUSY_TIMEOUT_MS: '100'

  server:
    environment:
      SUPERTOKENS_RATE_LIMIT: '0'
      AUTH_REQUIRE_EMAIL_VERIFICATION: '1'
networks:
  stack: {}
