global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:10254']

  - job_name: 'hive-services-host'
    # Hive services typically run on the host (not in docker compose) during local dev.
    # Each service exposes /metrics on PROMETHEUS_METRICS_PORT, defaulting to 10254
    # (see packages/services/*/environment.ts). The OTEL collector publishes its own
    # /metrics on host port 10255 instead of 10254 so this port stays free for
    # host-running Hive services. If you run multiple Hive services at once, set
    # PROMETHEUS_METRICS_PORT to a different value for the extras and add them here.
    static_configs:
      - targets: ['host.docker.internal:10254']
