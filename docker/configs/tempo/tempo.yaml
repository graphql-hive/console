# Minimal Tempo config for local dev. Receives OTLP from the otel-collector on
# the internal `stack` Docker network, stores trace blocks on local disk with a
# short retention (production uses Grafana Cloud Tempo; this only needs to
# survive a single dev session).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 6h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
