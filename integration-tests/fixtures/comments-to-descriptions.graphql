  """ This is an extremely long comment line that should extend past a reasonable number of columns for this to all be printed together on one line because we like to split long text into multiple lines for readability. Having a lot of text on one line requires excessive scrolling and horizontal scrolling is pretty bad.
  """
  value: Boolean @deprecated
}

